<title>Mundial 2026 · Calendario Completo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root {

  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}

  header{position:relative;padding:3rem 1.5rem 2rem;text-align:center;background:linear-gradient(180deg,#0d1525 0%,transparent 100%);border-bottom:1px solid var(--border);overflow:hidden;}
  header::after{content:'2026';position:absolute;font-family:'Bebas Neue',sans-serif;font-size:20rem;color:rgba(232,184,75,.03);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;white-space:nowrap;}
  .logo-flags{display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:1.6rem;margin-bottom:.5rem;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,5rem);letter-spacing:.05em;line-height:1;color:var(--accent);text-shadow:0 0 60px rgba(232,184,75,.3);}
  .subtitle{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:.4rem;}
  .stats-bar{display:flex;justify-content:center;gap:2.5rem;margin-top:1.5rem;flex-wrap:wrap;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);line-height:1;}
  .stat-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);}

  .api-bar{background:rgba(59,130,246,.08);border-bottom:1px solid rgba(59,130,246,.2);padding:.5rem 1.5rem;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;}
  .api-status{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.4rem;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;flex-shrink:0;}
  .api-status.ok .dot{background:var(--win);animation:pulse 2s infinite;}
  .api-status.loading .dot{background:var(--accent);animation:pulse .8s infinite;}
  .api-status.error .dot{background:var(--loss);}
  .api-status.warn .dot{background:var(--draw);}

  .last-updated{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;color:var(--muted);letter-spacing:.08em;}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .controls{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;}
  .controls-inner{max-width:1100px;margin:0 auto;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;}
  .filter-btn{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .85rem;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap;}

  .filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
  .search-box{margin-left:auto;position:relative;}
  .search-box input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:.35rem .75rem .35rem 2rem;border-radius:3px;font-family:'Barlow',sans-serif;font-size:.85rem;width:200px;outline:none;transition:border-color .15s;}
  .search-box input:focus{border-color:var(--accent2);}
  .search-box::before{content:'⌕';position:absolute;left:.5rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;pointer-events:none;}

  main{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 4rem;}

  .phase-section{margin-bottom:2.5rem;}
  .phase-header{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;cursor:pointer;user-select:none;}
  .phase-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.08em;color:var(--accent);}
  .phase-line{flex:1;height:1px;background:var(--border);}
  .phase-count{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}
  .phase-toggle{font-size:.8rem;color:var(--muted);transition:transform .2s;}
  .phase-section.collapsed .phase-toggle{transform:rotate(-90deg);}
  .phase-section.collapsed .day-group{display:none;}

  .day-group{margin-bottom:1.5rem;}
  .day-label{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:.3rem 0;border-bottom:1px solid var(--border);margin-bottom:.5rem;}

  .match-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:6px;padding:.7rem 1rem;margin-bottom:.4rem;display:grid;grid-template-columns:80px 1fr 1fr auto;gap:.75rem;align-items:center;transition:border-color .15s,transform .1s;}
  .match-card:hover{border-color:rgba(232,184,75,.3);border-left-color:var(--accent);transform:translateX(2px);}
  .match-card.finished{opacity:.78;border-left-color:var(--muted)!important;}
  .match-card.live{border-left-color:var(--live)!important;animation:liveGlow 2s ease-in-out infinite;}
  @keyframes liveGlow{0%,100%{box-shadow:none}50%{box-shadow:0 0 14px rgba(255,68,68,.2)}}
  .venue-flag-mx{border-left-color:var(--mexico)!important;}
  .venue-flag-us{border-left-color:var(--usa)!important;}
  .venue-flag-ca{border-left-color:var(--canada)!important;}
  .match-card.live{border-left-color:var(--live)!important;}

  .match-time{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--accent);line-height:1;}
  .match-time-sub{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}

  .team-flag{font-size:1.1rem;}
  .match-venue{font-size:.72rem;color:var(--muted);}
  .venue-city{color:var(--accent2);font-weight:600;}

  .match-score{text-align:center;min-width:70px;}
  .score-display{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.05em;line-height:1;}
  .score-dash{color:var(--muted);font-size:1rem;}
  .score-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
  .score-pending{font-size:.72rem;color:var(--muted);border:1px dashed var(--border);padding:.25rem .6rem;border-radius:3px;white-space:nowrap;}
  .live-badge{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--live);border:1px solid var(--live);padding:.1rem .35rem;border-radius:2px;margin-top:.2rem;display:inline-block;animation:pulse 1.5s infinite;}

  .match-meta{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;}
  .group-badge{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .4rem;border-radius:2px;background:rgba(232,184,75,.12);color:var(--accent);border:1px solid rgba(232,184,75,.25);white-space:nowrap;}

  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease;}

  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#000;padding:.6rem 1.5rem;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;transition:transform .3s ease;z-index:9999;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  .no-results{text-align:center;padding:3rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;letter-spacing:.1em;text-transform:uppercase;display:none;}

    .match-card{grid-template-columns:65px 1fr auto;}
    .match-venue{display:none;}
    h1{font-size:3rem;}
    .filter-btn{font-size:.7rem;padding:.3rem .55rem;}
    .search-box input{width:130px;}
  }
</style>
</head>

// CDT = ET - 1h = UTC - 5h
function etToCdt(et) {
  const [time, period] = et.split(' ');
  let [h, m] = time.split(':').map(Number);
  if (period==='PM' && h!==12) h+=12;
  if (period==='AM' && h===12) h=0;
  h = (h - 1 + 24) % 24;
  const p2 = h>=12?'PM':'AM';
  return `${h%12||12}:${String(m).padStart(2,'0')} ${p2}`;
}

// ── API scores overlay ───────────────────────────────────
const API_KEY = '908f4e0672ea47d49e640c4b0e0501d4';
const CACHE_KEY = 'wc2026_api_scores_v3';
const CACHE_TS  = 'wc2026_api_ts_v3';
const TTL = 60 * 60 * 1000; // 1 hora

// apiScores: map by "team1_team2" -> {g1, g2, status}
let apiScores = {};

function makeKey(t1, t2) { return `${t1}||${t2}`; }

// Map API team names to our local names
const NAME_MAP = {
  'Mexico':'México','South Africa':'Sudáfrica','South Korea':'Corea del Sur',
  'Czechia':'Chequia','Canada':'Canadá','Bosnia and Herzegovina':'Bosnia & Herzegovina',
  'United States':'USA','Switzerland':'Suiza','Brazil':'Brasil','Morocco':'Marruecos',
  'Haiti':'Haití','Scotland':'Escocia','Australia':'Australia','Turkey':'Turquía',
  'Germany':'Alemania','Netherlands':'Países Bajos','Japan':'Japón','Sweden':'Suecia',
  'Tunisia':'Túnez',"Côte d'Ivoire":'Costa de Marfil','Spain':'España',
  'Cape Verde':'Cabo Verde','Belgium':'Bélgica','Egypt':'Egipto','New Zealand':'Nueva Zelanda',
  'Saudi Arabia':'Arabia Saudita','France':'Francia','Norway':'Noruega','Iraq':'Irak',
  'Algeria':'Argelia','Jordan':'Jordania','DR Congo':'Congo RD','England':'Inglaterra',
  'Croatia':'Croacia','Ghana':'Ghana','Panama':'Panamá','Uzbekistan':'Uzbekistán',
};
const norm = n => NAME_MAP[n] || n;

async function tryFetchAPI(force=false) {
  const setStatus = (type, msg) => {
    const el = document.getElementById('apiStatus');
    el.className = `api-status ${type}`;
    document.getElementById('apiStatusText').textContent = msg;
  };

  // Check cache first
  if (!force) {
    const ts = parseInt(localStorage.getItem(CACHE_TS)||'0');
    if (Date.now()-ts < TTL) {
      try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) { apiScores = JSON.parse(cached); setStatus('ok','Datos actualizados · football-data.org'); updateTS(ts); renderAll(); return; }
      } catch(e) {}
    }
  }

  setStatus('loading','Consultando football-data.org…');

  try {
    const res = await fetch('https://api.football-data.org/v4/competitions/WC/matches', {
      headers: {'X-Auth-Token': API_KEY}
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    const data = await res.json();
    const matches = data.matches || [];

    apiScores = {};
    matches.forEach(m => {
      const t1 = norm(m.homeTeam?.name||'');
      const t2 = norm(m.awayTeam?.name||'');
      const g1 = m.score?.fullTime?.home;
      const g2 = m.score?.fullTime?.away;
      const st = m.status;
      if (t1 && t2) apiScores[makeKey(t1,t2)] = {g1, g2, status: st};
    });

    localStorage.setItem(CACHE_KEY, JSON.stringify(apiScores));
    localStorage.setItem(CACHE_TS, Date.now().toString());
    setStatus('ok', `Resultados actualizados · ${matches.length} partidos`);
    updateTS(Date.now());
    showToast('✓ Resultados actualizados');
    renderAll();
  } catch(err) {
    // Si la API falla, mostramos advertencia pero el calendario igual funciona
    setStatus('warn', `API no disponible · Mostrando calendario base`);
    try {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) apiScores = JSON.parse(cached);
    } catch(e) {}
    renderAll();
  }
}

function updateTS(ts) {
  const d = new Date(ts);
  const h = d.getHours()%12||12, m=d.getMinutes(), ap=d.getHours()>=12?'PM':'AM';
  document.getElementById('lastUpdated').textContent = `Última actualización: ${h}:${String(m).padStart(2,'0')} ${ap}`;
}

// ── RENDER ────────────────────────────────────────────────
let currentFilter = 'all';
let currentSearch = '';

function getScore(m) {
  const key = makeKey(m.t1, m.t2);
  return apiScores[key] || null;
}

function renderAll() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  let finished = 0, live = 0;
  BASE.forEach(m => {
    const s = getScore(m);
    if (!s) return;
    if (s.status==='FINISHED') finished++;
    if (['IN_PLAY','PAUSED','HALFTIME'].includes(s.status)) live++;
  });

  document.getElementById('finishedCount').textContent = finished;
  document.getElementById('liveCount').textContent = live;
  const pct = Math.round((finished/104)*100);
  document.getElementById('progressPct').textContent = pct+'%';
  document.getElementById('progressFill').style.width = pct+'%';

  const phases = ['groups','r32','r16','qf','sf','final'];
  const labels = {groups:'Fase de Grupos',r32:'Ronda de 32',r16:'Octavos de Final',qf:'Cuartos de Final',sf:'Semifinales',final:'Final'};

  let totalVisible = 0;

  phases.forEach(phase => {
    const ms = BASE.filter(m => m.p===phase && matchVisible(m));
    if (!ms.length) return;
    totalVisible += ms.length;

    const sec = document.createElement('div');
    sec.className = 'phase-section';
    const hdr = document.createElement('div');
    hdr.className = 'phase-header';
    hdr.innerHTML = `<div class="phase-title">${labels[phase]}</div><div class="phase-line"></div><div class="phase-count">${ms.length} partidos</div><div class="phase-toggle">▼</div>`;
    hdr.onclick = () => sec.classList.toggle('collapsed');
    sec.appendChild(hdr);

    // Group by day
    const byDay = {};
    ms.forEach(m => { if(!byDay[m.d]) byDay[m.d]=[]; byDay[m.d].push(m); });

    Object.entries(byDay).forEach(([day, dayMs]) => {
      const dg = document.createElement('div');
      dg.className = 'day-group';
      dg.innerHTML = `<div class="day-label">📅 ${day}</div>`;
      dayMs.forEach(m => dg.appendChild(buildCard(m)));
      sec.appendChild(dg);
    });
    main.appendChild(sec);
  });

  document.getElementById('noResults').style.display = totalVisible===0 ? 'block' : 'none';
}

function buildCard(m) {
  const vi = venueInfo(m.v);
  const score = getScore(m);
  const isLive = score && ['IN_PLAY','PAUSED','HALFTIME'].includes(score.status);
  const isDone = score && score.status==='FINISHED';
  const cFlag = {'mx':'🇲🇽','us':'🇺🇸','ca':'🇨🇦'}[vi.country]||'';
  const vCls = {'mx':'venue-flag-mx','us':'venue-flag-us','ca':'venue-flag-ca'}[vi.country]||'';

  let scoreHtml = '';
  if (isLive) {
    const lg1 = score.g1??'–', lg2 = score.g2??'–';
    scoreHtml = `<div class="match-score"><div class="score-display"><span style="color:var(--live)">${lg1}</span><span class="score-dash"> – </span><span style="color:var(--live)">${lg2}</span></div><div class="live-badge">En Vivo</div></div>`;
  } else if (isDone && score.g1!==null && score.g1!==undefined) {
    const g1=score.g1, g2=score.g2;
    const c1 = g1>g2?'var(--win)':g1<g2?'var(--loss)':'var(--draw)';
    const c2 = g2>g1?'var(--win)':g2<g1?'var(--loss)':'var(--draw)';
    scoreHtml = `<div class="match-score"><div class="score-display"><span style="color:${c1}">${g1}</span><span class="score-dash"> – </span><span style="color:${c2}">${g2}</span></div><div class="score-label">Final</div></div>`;
  } else {
    scoreHtml = `<div class="match-score"><div class="score-pending">${etToCdt(m.et)}</div></div>`;
  }

  const card = document.createElement('div');
  card.className = `match-card ${isLive?'live':isDone?'finished':vCls}`;

  card.innerHTML = `
    <div>
      <div class="match-num">P${m.id}</div>
      <div class="match-time">${etToCdt(m.et)}</div>
      <div class="match-time-sub">CDT</div>
    </div>
    <div class="match-teams">
      <div class="teams-row"><span class="team-flag">${f(m.t1)}</span><span>${m.t1}</span></div>
      <div class="teams-row"><span class="team-flag">${f(m.t2)}</span><span>${m.t2}</span></div>
    </div>
    <div class="match-venue">
      ${cFlag} <span class="venue-city">${vi.city}</span><br>
      <span style="font-size:.65rem">${vi.short}</span>
    </div>
    <div class="match-meta">
      ${m.g?`<div class="group-badge">Grupo ${m.g}</div>`:''}
      ${scoreHtml}
    </div>
  `;
  return card;
}

function matchVisible(m) {
  const vi = venueInfo(m.v);
  const score = getScore(m);
  const isLive = score && ['IN_PLAY','PAUSED','HALFTIME'].includes(score.status);

  if (currentFilter==='mexico' && vi.country!=='mx') return false;
  if (currentFilter==='live' && !isLive) return false;
  if (!['all','mexico','live'].includes(currentFilter) && m.p!==currentFilter) return false;
  if (currentSearch) {
    const s = currentSearch;
    if (!m.t1.toLowerCase().includes(s) && !m.t2.toLowerCase().includes(s)) return false;
  }
  return true;
}

function filterPhase(phase, btn) {
  currentFilter = phase;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function filterSearch(val) { currentSearch = val.toLowerCase(); renderAll(); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── INIT ─────────────────────────────────────────────────
// 1. Renderizar calendario base inmediatamente
renderAll();
// 2. Intentar traer scores de la API
tryFetchAPI();
// 3. Auto-refresh cada hora
setInterval(()=>tryFetchAPI(true), TTL);
// 4. Si hay partido en vivo → refresh cada 60s
setInterval(()=>{
  const hasLive = Object.values(apiScores).some(s=>['IN_PLAY','PAUSED','HALFTIME'].includes(s.status));
  if (hasLive) tryFetchAPI(true);
}, 60000);
</script>
